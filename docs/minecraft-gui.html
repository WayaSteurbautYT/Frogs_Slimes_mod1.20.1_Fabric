<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frog & Slime Gamemode - Interactive GUI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Minecraft', 'Courier New', monospace;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #fff;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1, h2, h3 {
            color: #4ade80;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }

        .section {
            background: rgba(0,0,0,0.3);
            border: 2px solid #4ade80;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 30px;
        }

        /* Crafting Table GUI */
        .crafting-table {
            background: #8b8b8b;
            border: 4px solid #373737;
            border-radius: 5px;
            padding: 20px;
            display: inline-block;
            position: relative;
        }

        .crafting-table::before {
            content: '';
            position: absolute;
            top: -8px;
            left: -8px;
            right: -8px;
            bottom: -8px;
            border: 2px solid #fff;
            border-radius: 8px;
            pointer-events: none;
        }

        .crafting-grid {
            display: grid;
            grid-template-columns: repeat(3, 60px);
            grid-template-rows: repeat(3, 60px);
            gap: 4px;
            margin-bottom: 20px;
        }

        .crafting-slot {
            width: 60px;
            height: 60px;
            background: #8b8b8b;
            border: 2px solid #373737;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
            transition: all 0.2s;
        }

        .crafting-slot:hover {
            background: #a0a0a0;
            transform: scale(1.05);
        }

        .crafting-slot.has-item {
            background: #c6c6c6;
        }

        .crafting-slot img {
            width: 48px;
            height: 48px;
            image-rendering: pixelated;
        }

        .crafting-arrow {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 10px 0;
            color: #fff;
            font-size: 24px;
        }

        .result-slot {
            width: 80px;
            height: 80px;
            background: #8b8b8b;
            border: 3px solid #373737;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-left: 20px;
            position: relative;
        }

        .result-slot img {
            width: 64px;
            height: 64px;
            image-rendering: pixelated;
        }

        .crafting-container {
            display: flex;
            align-items: center;
        }

        /* Tooltip */
        .tooltip {
            position: absolute;
            background: rgba(0,0,0,0.95);
            border: 2px solid #4ade80;
            border-radius: 5px;
            padding: 10px;
            min-width: 200px;
            z-index: 1000;
            display: none;
            pointer-events: none;
            font-size: 12px;
            line-height: 1.4;
        }

        .tooltip.visible {
            display: block;
        }

        .tooltip-title {
            color: #ffff55;
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .tooltip-rarity {
            color: #4ade80;
            margin-bottom: 5px;
        }

        .tooltip-description {
            color: #aaa;
            margin-bottom: 8px;
        }

        .tooltip-stats {
            color: #ff5555;
            margin-bottom: 5px;
        }

        .tooltip-abilities {
            color: #55ffff;
            margin-bottom: 5px;
        }

        .tooltip-nbt {
            color: #ffaa00;
            font-size: 10px;
            font-family: monospace;
        }

        /* Achievement GUI */
        .achievement-tree {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .achievement {
            background: linear-gradient(135deg, #2d2d2d 0%, #1a1a1a 100%);
            border: 2px solid #555;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .achievement:hover {
            border-color: #4ade80;
            transform: translateY(-5px);
            box-shadow: 0 5px 20px rgba(74, 222, 128, 0.3);
        }

        .achievement.unlocked {
            border-color: #4ade80;
            background: linear-gradient(135deg, #1a3a1a 0%, #0d2d0d 100%);
        }

        .achievement-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 10px;
            background: #333;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
        }

        .achievement-title {
            color: #4ade80;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .achievement-desc {
            color: #aaa;
            font-size: 12px;
        }

        /* Potion Brewing GUI */
        .brewing-stand {
            background: #8b8b8b;
            border: 4px solid #373737;
            border-radius: 5px;
            padding: 20px;
            display: inline-block;
        }

        .brewing-slots {
            display: flex;
            gap: 20px;
            align-items: flex-start;
        }

        .brewing-column {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .brewing-slot {
            width: 50px;
            height: 50px;
            background: #8b8b8b;
            border: 2px solid #373737;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .brewing-slot img {
            width: 40px;
            height: 40px;
            image-rendering: pixelated;
        }

        .potion-slot {
            width: 50px;
            height: 70px;
            background: #8b8b8b;
            border: 2px solid #373737;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* Recipe Selector */
        .recipe-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .recipe-btn {
            background: #4ade80;
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-family: inherit;
            font-weight: bold;
            transition: all 0.2s;
        }

        .recipe-btn:hover {
            background: #22c55e;
            transform: scale(1.05);
        }

        .recipe-btn.active {
            background: #16a34a;
            box-shadow: 0 0 10px rgba(74, 222, 128, 0.5);
        }

        /* Item Collection */
        .item-collection {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
            gap: 10px;
            padding: 20px;
        }

        .collection-item {
            width: 80px;
            height: 80px;
            background: #2d2d2d;
            border: 2px solid #555;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .collection-item:hover {
            border-color: #4ade80;
            transform: scale(1.1);
        }

        .collection-item img {
            width: 64px;
            height: 64px;
            image-rendering: pixelated;
        }

        .collection-item .item-count {
            position: absolute;
            bottom: 2px;
            right: 5px;
            color: #fff;
            font-size: 12px;
            text-shadow: 1px 1px 2px #000;
        }

        /* Skill Tree */
        .skill-tree {
            display: flex;
            flex-direction: column;
            gap: 30px;
            padding: 20px;
        }

        .skill-node {
            background: linear-gradient(135deg, #2d2d2d 0%, #1a1a1a 100%);
            border: 2px solid #555;
            border-radius: 10px;
            padding: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .skill-node:hover {
            border-color: #4ade80;
            transform: translateX(10px);
        }

        .skill-node.unlocked {
            border-color: #4ade80;
            background: linear-gradient(135deg, #1a3a1a 0%, #0d2d0d 100%);
        }

        .skill-icon {
            width: 50px;
            height: 50px;
            background: #333;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .skill-info {
            flex: 1;
        }

        .skill-name {
            color: #4ade80;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .skill-desc {
            color: #aaa;
            font-size: 12px;
        }

        .skill-requirements {
            color: #ff5555;
            font-size: 11px;
            margin-top: 5px;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            border-bottom: 2px solid #4ade80;
        }

        .tab {
            background: transparent;
            color: #aaa;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }

        .tab:hover {
            color: #fff;
        }

        .tab.active {
            color: #4ade80;
            border-bottom: 2px solid #4ade80;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .crafting-grid {
                grid-template-columns: repeat(3, 45px);
                grid-template-rows: repeat(3, 45px);
            }

            .crafting-slot {
                width: 45px;
                height: 45px;
            }

            .crafting-slot img {
                width: 36px;
                height: 36px;
            }

            .result-slot {
                width: 60px;
                height: 60px;
            }

            .result-slot img {
                width: 48px;
                height: 48px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐸 Frog & Slime Gamemode - Interactive GUI</h1>

        <div class="tabs">
            <button class="tab active" data-tab="crafting">⚒️ Crafting</button>
            <button class="tab" data-tab="achievements">🏆 Achievements</button>
            <button class="tab" data-tab="items">📦 Items</button>
            <button class="tab" data-tab="potions">🧪 Potions</button>
            <button class="tab" data-tab="skills">⭐ Skills</button>
        </div>

        <!-- Crafting Tab -->
        <div class="tab-content active" id="crafting">
            <div class="section">
                <h2>⚒️ Crafting Recipes</h2>
                <div class="recipe-selector">
                    <button class="recipe-btn active" data-recipe="evolution-stone">Evolution Stone</button>
                    <button class="recipe-btn" data-recipe="dream-sword">Dream Sword</button>
                    <button class="recipe-btn" data-recipe="techno-sword">Technoblade Sword</button>
                    <button class="recipe-btn" data-recipe="slime-food">Slime Food</button>
                    <button class="recipe-btn" data-recipe="frog-food">Frog Food</button>
                    <button class="recipe-btn" data-recipe="task-book">Task Book</button>
                </div>

                <div class="crafting-table">
                    <div class="crafting-container">
                        <div>
                            <div class="crafting-grid" id="crafting-grid">
                                <!-- Slots will be populated by JS -->
                            </div>
                            <div class="crafting-arrow">➡️</div>
                        </div>
                        <div class="result-slot" id="result-slot">
                            <!-- Result will be populated by JS -->
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Achievements Tab -->
        <div class="tab-content" id="achievements">
            <div class="section">
                <h2>🏆 Achievements & Advancements</h2>
                <div class="achievement-tree" id="achievement-tree">
                    <!-- Achievements will be populated by JS -->
                </div>
            </div>
        </div>

        <!-- Items Tab -->
        <div class="tab-content" id="items">
            <div class="section">
                <h2>📦 Item Collection</h2>
                <div class="item-collection" id="item-collection">
                    <!-- Items will be populated by JS -->
                </div>
            </div>
        </div>

        <!-- Potions Tab -->
        <div class="tab-content" id="potions">
            <div class="section">
                <h2>🧪 Potion Brewing</h2>
                <div class="brewing-stand">
                    <div class="brewing-slots">
                        <div class="brewing-column">
                            <div class="brewing-slot" data-item="nether-wart">🌿</div>
                            <div class="brewing-slot" data-item="blaze-powder">🔥</div>
                        </div>
                        <div class="brewing-column">
                            <div class="potion-slot" data-potion="awkward">🧪</div>
                            <div class="potion-slot" data-potion="strength">💪</div>
                            <div class="potion-slot" data-potion="speed">⚡</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Skills Tab -->
        <div class="tab-content" id="skills">
            <div class="section">
                <h2>⭐ Evolution Skills</h2>
                <div class="skill-tree" id="skill-tree">
                    <!-- Skills will be populated by JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Tooltip Element -->
    <div class="tooltip" id="tooltip">
        <div class="tooltip-title"></div>
        <div class="tooltip-rarity"></div>
        <div class="tooltip-description"></div>
        <div class="tooltip-stats"></div>
        <div class="tooltip-abilities"></div>
        <div class="tooltip-nbt"></div>
    </div>

    <script>
        // Item Data with NBT tags and abilities
        const itemData = {
            'evolution-stone': {
                name: 'Evolution Stone',
                rarity: '✨ Epic',
                description: 'Instantly evolves your helper to the next stage',
                stats: 'Special Item',
                abilities: 'Instant Evolution',
                nbt: '{EvolutionPower: 1, CanEvolve: true, EvolutionStage: +1}',
                icon: '💎',
                texture: 'evolution_stone.png'
            },
            'dream-sword': {
                name: 'Dream Sword',
                rarity: '🌟 Legendary',
                description: 'A sword worthy of a speedrunner',
                stats: 'Attack: 12 | Speed: +0.5',
                abilities: 'Speed Boost on Hit',
                nbt: '{AttackDamage: 12, SpeedBonus: 0.5, DreamBlessing: true}',
                icon: '⚔️',
                texture: 'dream_sword.png'
            },
            'techno-sword': {
                name: 'Technoblade Sword',
                rarity: '🌟 Legendary',
                description: 'Technoblade never dies!',
                stats: 'Attack: 14 | Knockback: +2',
                abilities: 'Piglin Friendship',
                nbt: '{AttackDamage: 14, Knockback: 2, TechnoSpirit: true}',
                icon: '🗡️',
                texture: 'technoblade_sword.png'
            },
            'slime-food': {
                name: 'Slime Food',
                rarity: '🟢 Common',
                description: 'Feed this to your slime helper to strengthen it',
                stats: 'Health: +5 | Damage: +1',
                abilities: 'Slime Affinity',
                nbt: '{HealAmount: 5, DamageBonus: 1, SlimeType: true}',
                icon: '🍖',
                texture: 'slime_food.png'
            },
            'frog-food': {
                name: 'Frog Food',
                rarity: '🟢 Common',
                description: 'Feed this to your frog helper to strengthen it',
                stats: 'Health: +3 | Jump: +1',
                abilities: 'Frog Affinity',
                nbt: '{HealAmount: 3, JumpBonus: 1, FrogType: true}',
                icon: '🪰',
                texture: 'frog_food.png'
            },
            'task-book': {
                name: 'Task Book',
                rarity: '🔵 Rare',
                description: 'View and track your challenges',
                stats: 'Utility Item',
                abilities: 'Task Tracking',
                nbt: '{TaskTracker: true, ChallengeCount: 10}',
                icon: '📖',
                texture: 'task_book.png'
            },
            'diamond': {
                name: 'Diamond',
                rarity: '🔵 Rare',
                description: 'A precious gem',
                stats: 'Material',
                abilities: 'Crafting Component',
                nbt: '{Material: diamond, Durability: 1561}',
                icon: '💎',
                texture: 'diamond.png'
            },
            'slime-ball': {
                name: 'Slime Ball',
                rarity: '🟢 Common',
                description: 'Sticky and bouncy',
                stats: 'Material',
                abilities: 'Slime Crafting',
                nbt: '{Material: slime_ball, Sticky: true}',
                icon: '🫧',
                texture: 'slime_ball.png'
            },
            'gold-block': {
                name: 'Gold Block',
                rarity: '🟡 Uncommon',
                description: 'A block of pure gold',
                stats: 'Material',
                abilities: 'Crafting Component',
                nbt: '{Material: gold_block, Value: high}',
                icon: '🟨',
                texture: 'gold_block.png'
            },
            'netherite-sword': {
                name: 'Netherite Sword',
                rarity: '🟡 Uncommon',
                description: 'The strongest sword material',
                stats: 'Attack: 8 | Durability: 2031',
                abilities: 'Fire Immunity',
                nbt: '{AttackDamage: 8, Durability: 2031, FireImmune: true}',
                icon: '⚔️',
                texture: 'netherite_sword.png'
            }
        };

        // Recipe Data
        const recipes = {
            'evolution-stone': {
                grid: [
                    ['', 'diamond', ''],
                    ['diamond', 'slime-ball', 'diamond'],
                    ['', 'diamond', '']
                ],
                result: 'evolution-stone'
            },
            'dream-sword': {
                grid: [
                    ['', 'gold-block', ''],
                    ['gold-block', 'netherite-sword', 'gold-block'],
                    ['', 'gold-block', '']
                ],
                result: 'dream-sword'
            },
            'techno-sword': {
                grid: [
                    ['', 'bone-block', ''],
                    ['bone-block', 'netherite-sword', 'bone-block'],
                    ['', 'bone-block', '']
                ],
                result: 'techno-sword'
            },
            'slime-food': {
                grid: [
                    ['slime-ball', 'slime-ball', 'slime-ball'],
                    ['slime-ball', 'rabbit', 'slime-ball'],
                    ['slime-ball', 'slime-ball', 'slime-ball']
                ],
                result: 'slime-food'
            },
            'frog-food': {
                grid: [
                    ['spider-eye', 'spider-eye', 'spider-eye'],
                    ['spider-eye', 'cooked-chicken', 'spider-eye'],
                    ['spider-eye', 'spider-eye', 'spider-eye']
                ],
                result: 'frog-food'
            },
            'task-book': {
                grid: [
                    ['', 'book', ''],
                    ['book', 'paper', 'book'],
                    ['', 'book', '']
                ],
                result: 'task-book'
            }
        };

        // Achievement Data
        const achievements = [
            { id: 'first-helper', title: 'First Helper', desc: 'Tame your first frog or slime', icon: '🐸', unlocked: true },
            { id: 'evolve-1', title: 'Evolution Beginner', desc: 'Evolve a helper to stage 1', icon: '⭐', unlocked: true },
            { id: 'evolve-2', title: 'Evolution Expert', desc: 'Evolve a helper to stage 2', icon: '⭐⭐', unlocked: true },
            { id: 'evolve-3', title: 'Evolution Master', desc: 'Evolve a helper to stage 3', icon: '⭐⭐⭐', unlocked: false },
            { id: 'final-form', title: 'Final Form', desc: 'Unlock the final slime evolution', icon: '👑', unlocked: false },
            { id: 'boss-slayer', title: 'Boss Slayer', desc: 'Defeat the Giant Slime Boss', icon: '👹', unlocked: false },
            { id: 'task-master', title: 'Task Master', desc: 'Complete all 10 challenges', icon: '📋', unlocked: false }
        ];

        // Skill Data
        const skills = [
            { id: 'basic-attack', name: 'Basic Attack', desc: 'Your helper can attack nearby mobs', icon: '⚔️', unlocked: true, requirements: 'None' },
            { id: 'mob-collection', name: 'Mob Collection', desc: 'Helper automatically collects drops', icon: '📦', unlocked: true, requirements: 'Basic Attack' },
            { id: 'evolution-1', name: 'Evolution Stage 1', desc: 'Unlock first evolution stage', icon: '⭐', unlocked: true, requirements: 'Kill 10 mobs' },
            { id: 'evolution-2', name: 'Evolution Stage 2', desc: 'Unlock second evolution stage', icon: '⭐⭐', unlocked: false, requirements: 'Kill 25 mobs' },
            { id: 'evolution-3', name: 'Evolution Stage 3', desc: 'Unlock third evolution stage', icon: '⭐⭐⭐', unlocked: false, requirements: 'Kill 50 mobs' },
            { id: 'final-evolution', name: 'Final Evolution', desc: 'Unlock ultimate slime form', icon: '👑', unlocked: false, requirements: 'Defeat Giant Slime Boss' }
        ];

        // Initialize Crafting Grid
        function initCraftingGrid(recipeId) {
            const grid = document.getElementById('crafting-grid');
            const resultSlot = document.getElementById('result-slot');
            const recipe = recipes[recipeId];
            
            grid.innerHTML = '';
            
            recipe.grid.forEach((item, index) => {
                const slot = document.createElement('div');
                slot.className = 'crafting-slot' + (item ? ' has-item' : '');
                
                if (item && itemData[item]) {
                    slot.innerHTML = `<span style="font-size: 32px;">${itemData[item].icon}</span>`;
                    slot.dataset.item = item;
                }
                
                slot.addEventListener('mouseenter', (e) => showTooltip(e, item));
                slot.addEventListener('mouseleave', hideTooltip);
                grid.appendChild(slot);
            });
            
            // Set result
            const resultItem = itemData[recipe.result];
            if (resultItem) {
                resultSlot.innerHTML = `<span style="font-size: 40px;">${resultItem.icon}</span>`;
                resultSlot.dataset.item = recipe.result;
                resultSlot.addEventListener('mouseenter', (e) => showTooltip(e, recipe.result));
                resultSlot.addEventListener('mouseleave', hideTooltip);
            }
        }

        // Initialize Achievements
        function initAchievements() {
            const tree = document.getElementById('achievement-tree');
            tree.innerHTML = '';
            
            achievements.forEach(ach => {
                const div = document.createElement('div');
                div.className = 'achievement' + (ach.unlocked ? ' unlocked' : '');
                div.innerHTML = `
                    <div class="achievement-icon">${ach.icon}</div>
                    <div class="achievement-title">${ach.title}</div>
                    <div class="achievement-desc">${ach.desc}</div>
                `;
                tree.appendChild(div);
            });
        }

        // Initialize Item Collection
        function initItemCollection() {
            const collection = document.getElementById('item-collection');
            collection.innerHTML = '';
            
            Object.keys(itemData).forEach(itemId => {
                const item = itemData[itemId];
                const div = document.createElement('div');
                div.className = 'collection-item';
                div.innerHTML = `<span style="font-size: 40px;">${item.icon}</span>`;
                div.dataset.item = itemId;
                div.addEventListener('mouseenter', (e) => showTooltip(e, itemId));
                div.addEventListener('mouseleave', hideTooltip);
                collection.appendChild(div);
            });
        }

        // Initialize Skills
        function initSkills() {
            const tree = document.getElementById('skill-tree');
            tree.innerHTML = '';
            
            skills.forEach(skill => {
                const div = document.createElement('div');
                div.className = 'skill-node' + (skill.unlocked ? ' unlocked' : '');
                div.innerHTML = `
                    <div class="skill-icon">${skill.icon}</div>
                    <div class="skill-info">
                        <div class="skill-name">${skill.name}</div>
                        <div class="skill-desc">${skill.desc}</div>
                        <div class="skill-requirements">Requires: ${skill.requirements}</div>
                    </div>
                `;
                tree.appendChild(div);
            });
        }

        // Tooltip Functions
        function showTooltip(e, itemId) {
            if (!itemId || !itemData[itemId]) return;
            
            const item = itemData[itemId];
            const tooltip = document.getElementById('tooltip');
            
            tooltip.querySelector('.tooltip-title').textContent = item.name;
            tooltip.querySelector('.tooltip-rarity').textContent = item.rarity;
            tooltip.querySelector('.tooltip-description').textContent = item.description;
            tooltip.querySelector('.tooltip-stats').textContent = item.stats;
            tooltip.querySelector('.tooltip-abilities').textContent = item.abilities;
            tooltip.querySelector('.tooltip-nbt').textContent = 'NBT: ' + item.nbt;
            
            tooltip.style.left = e.pageX + 15 + 'px';
            tooltip.style.top = e.pageY + 15 + 'px';
            tooltip.classList.add('visible');
        }

        function hideTooltip() {
            document.getElementById('tooltip').classList.remove('visible');
        }

        // Tab Switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                
                tab.classList.add('active');
                document.getElementById(tab.dataset.tab).classList.add('active');
            });
        });

        // Recipe Switching
        document.querySelectorAll('.recipe-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.recipe-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                initCraftingGrid(btn.dataset.recipe);
            });
        });

        // Initialize everything
        document.addEventListener('DOMContentLoaded', () => {
            initCraftingGrid('evolution-stone');
            initAchievements();
            initItemCollection();
            initSkills();
        });
    </script>
</body>
</html>
